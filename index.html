<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binny Chopra's Practice Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ProjectCard = ({ project, index }) => {
            const colors = [
                ['#4ade80', '#65a30d'], // green-400  -> lime-600
                ['#fbbf24', '#ea580c'], // amber-400  -> orange-600
                ['#0ea5e9', '#2563eb'], // sky-500    -> blue-600
                ['#f43f5e', '#dc2626'], // rose-500   -> red-600
                ['#d946ef', '#7e22ce'], // fuchsia-500-> purple-700
                ['#2dd4bf', '#059669'], // teal-400   -> emerald-600
                ['#64748b', '#374151'], // slate-500  -> gray-700
                ['#fde047', '#eab308'], // yellow-300 -> yellow-500
                ['#ea580c', '#be123c'], // orange-600 -> rose-700
                ['#3b82f6', '#7c3aed']  // blue-500   -> violet-600
            ];

            const [from, to] = colors[index % colors.length];

            return (
                <a
                    href={project.link}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="block rounded-lg shadow-lg hover:shadow-2xl transition-all duration-300 hover:scale-105 p-6 cursor-pointer"
                    style={{ backgroundImage: `linear-gradient(to bottom right, ${from}, ${to})` }}
                >
                    <h3 className="text-xl font-bold text-white text-center">{project.name}</h3>
                </a>
            );
        };

        function App() {
            const projects = [
                { name: "World Map", link: "https://world-atlas-tawny-two.vercel.app/" },
                { name: "Password Generator", link: "https://react-practice-two-beige.vercel.app/pgen" },
                { name: "TODO List", link: "https://codesandbox.io/p/sandbox/condescending-fast-8q23ss" },
                { name: "Food Pagination", link: "https://codesandbox.io/p/sandbox/paginationrecipes-22gffh" },
                { name: "Products Pagination", link: "https://codesandbox.io/p/sandbox/pagination-sm89mz" },
                { name: "Autocomplete Search Bar", link: "https://codesandbox.io/p/sandbox/smoosh-river-zrt9gs" },
                { name: "Accordion", link: "https://codesandbox.io/p/sandbox/accordion-yckzyt" },
                { name: "Chips Input", link: "https://codesandbox.io/p/sandbox/chipsinput-sssqs3" },
                { name: "Tic Tac Toe", link: "https://codesandbox.io/p/sandbox/tictactoe-cr833n" },
                { name: "BG change", link: "https://react-practice-two-beige.vercel.app/" }
            ];

            return (
                <div
                    className="min-h-screen py-12 px-4"
                    style={{ backgroundImage: 'linear-gradient(to bottom right, #f8fafc, #eff6ff, #eef2ff)' }}
                >
                    <div className="container mx-auto max-w-7xl">
                        <div className="text-center mb-16">
                            <h1
                                className="text-5xl font-bold bg-clip-text text-transparent mb-4 p-2"
                                style={{ backgroundImage: 'linear-gradient(to right, #7c3aed, #4f46e5)' }}
                            >
                                Binny Chopra's Practice Playground
                            </h1>
                            <p className="text-gray-600 text-lg">A collection of my work and creations</p>
                            <div
                                className="w-24 h-1 mx-auto mt-4 rounded-full"
                                style={{ backgroundImage: 'linear-gradient(to right, #8b5cf6, #6366f1)' }}
                            ></div>
                            <p className="text-gray-600 text-sm m-5">
                                GitHub: <a
                                    href="https://github.com/binny-chopra"
                                    className="text-blue-600 underline"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                >
                                    https://github.com/binny-chopra
                                </a>
                            </p>

                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {projects.map((project, index) => (
                                <ProjectCard key={index} project={project} index={index} />
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
